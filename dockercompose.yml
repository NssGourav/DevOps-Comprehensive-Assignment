services:
  app:
    build:
      container_name: devops_app
      environment:
        PORT: 5000
        MONGO_URI: mongodb://mongo:27017/devops_assignment
        ports:
         - "80"
        depends-on:
          - mongo
  mongo:
    image: mongo:7
    container_name: devops_mongo
    volumes:
      - mongo-data:/data/db
  
volumes